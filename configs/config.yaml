model_name: openai/whisper-medium

# LoRA settings
use_lora: true
freeze_base_model: true

lora_r: 32          # Increased from 16 for better capacity on H200
lora_alpha: 64      # 2x lora_r as a good rule of thumb
lora_dropout: 0.05

# Performance
torch_compile: false   # Keep off; compile adds overhead with LoRA

# Precision — H200 has native bfloat16 support (preferred over fp16)
bf16: true
fp16: false

# Dataset
dataset:
  name: librispeech_asr
  subset: clean
  train_split: train.360    # 360-hour clean split (~104k samples total)
  val_split: validation     # librispeech validation.clean (~2,760 samples)
  # Materialise this many examples from the streaming dataset.
  # train.360 has ~104k samples; 28k gives good coverage without OOM.
  # Increase to 104000 to use all of train.360 (needs more time to stream).
  max_train_samples: 28000
  max_val_samples: 2760     # Full validation.clean set

training:
  # ─────────────────────────────────────────────────────────────────────
  # RunPod paths — keep everything on the 60 GB volume disk (/workspace)
  # so nothing spills onto the 20 GB container disk.
  # ─────────────────────────────────────────────────────────────────────
  output_dir: /workspace/whisper-medium-librispeech/outputs
  logging_dir: /workspace/whisper-medium-librispeech/logs

  # H200 (140 GB HBM3e) comfortably fits batch_size=32 for whisper-medium
  batch_size: 32
  eval_batch_size: 32
  gradient_accumulation_steps: 1   # no need to accumulate on H200

  learning_rate: 1.0e-4     # Higher LR is fine with LoRA + warmup
  num_epochs: 5
  warmup_steps: 500         # ~2% of steps at 28k samples / bs=32

  logging_steps: 50
  eval_steps: 500
  save_steps: 500
  save_total_limit: 3

  # Workers to keep H200 data pipeline saturated
  dataloader_num_workers: 8