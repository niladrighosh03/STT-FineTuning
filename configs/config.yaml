model_name: openai/whisper-small

dataset:
  name: librispeech_asr
  subset: clean
  train_split: train.100
  val_split: validation

training:
  output_dir: ./outputs
  batch_size: 8
  eval_batch_size: 8
  learning_rate: 1e-5
  num_epochs: 3
  warmup_steps: 500
  logging_steps: 50
  eval_steps: 500
  save_steps: 500
  gradient_accumulation_steps: 2
  fp16: true